<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>You're offline · StudyKro</title>
    <meta name="theme-color" content="#5f9e97" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <style>
      :root {
        color-scheme: light dark;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", system-ui, sans-serif;
        background: #f6f2ea;
        color: #1a1a1a;
        -webkit-font-smoothing: antialiased;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #0f1412; color: #f5f1e8; }
      }
      .wrap {
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: env(safe-area-inset-top, 16px) 20px env(safe-area-inset-bottom, 16px);
      }
      .pill {
        max-width: 380px;
        width: 100%;
        padding: 36px 28px;
        text-align: center;
        background: rgba(255,255,255,0.78);
        backdrop-filter: saturate(180%) blur(28px);
        -webkit-backdrop-filter: saturate(180%) blur(28px);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 32px;
        box-shadow: 0 20px 60px -10px rgba(0,0,0,0.18), 0 2px 6px rgba(0,0,0,0.06);
      }
      @media (prefers-color-scheme: dark) {
        .pill {
          background: rgba(28,32,30,0.78);
          border-color: rgba(255,255,255,0.08);
          box-shadow: 0 20px 60px -10px rgba(0,0,0,0.6);
        }
      }
      .icon {
        width: 72px;
        height: 72px;
        margin: 0 auto 18px;
        border-radius: 50%;
        background: linear-gradient(135deg, #5f9e97, #4a8580);
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 10px 30px -8px rgba(95,158,151,0.55);
      }
      h1 { font-size: 22px; margin: 0 0 8px; font-weight: 700; letter-spacing: -0.01em; }
      p { margin: 0; font-size: 15px; line-height: 1.55; opacity: 0.75; }
      button {
        margin-top: 22px;
        appearance: none;
        border: none;
        background: #1a1a1a;
        color: #fff;
        padding: 12px 24px;
        border-radius: 999px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: transform .15s ease, opacity .15s ease;
      }
      @media (prefers-color-scheme: dark) {
        button { background: #f5f1e8; color: #0f1412; }
      }
      button:active { transform: scale(0.97); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="pill" role="alert" aria-live="polite">
        <div class="icon" aria-hidden="true">
          <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 8.82a15 15 0 0 1 20 0"/>
            <path d="M5 12.859a10 10 0 0 1 14 0"/>
            <path d="M8.5 16.429a5 5 0 0 1 7 0"/>
            <line x1="12" y1="20" x2="12.01" y2="20"/>
            <line x1="2" y1="2" x2="22" y2="22"/>
          </svg>
        </div>
        <h1>You're offline</h1>
        <p>StudyKro needs an internet connection to run AI tools. Check your Wi‑Fi or mobile data and try again.</p>
        <button onclick="location.reload()">Try again</button>
      </div>
    </div>
  </body>
</html>
